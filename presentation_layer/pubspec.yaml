name: ciro
description: Crisis Intelligence & Response Orchestrator — Pakistan Emergency System
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.1.0
  firebase_database: ^11.0.0
  google_maps_flutter: ^2.7.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.0
  intl: ^0.19.0
  http: ^1.2.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/animations/
    - assets/fonts/
  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
